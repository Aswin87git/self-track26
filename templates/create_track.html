<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Tracking Session - Self Track 26</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <h1>🎯 Self Track 26</h1>
    </div>

    <div class="nav">
        <a href="/">Home</a>
        <a href="/create-track">Start Tracking</a>
    </div>

    <div class="container">
        <div class="content">
            <h2>Create New Tracking Session</h2>
            
            <form method="POST" class="form">
                <div class="form-group">
                    <label for="session_name">Session Name:</label>
                    <input type="text" id="session_name" name="session_name" placeholder="e.g., Fitness Goals" required>
                </div>

                <div class="form-group">
                    <label for="days">How many days do you want to track?</label>
                    <input type="number" id="days" name="days" min="1" max="365" value="7" required>
                </div>

                <button type="submit" class="btn-primary">Start Tracking</button>
            </form>

            <p><a href="/">Back to Home</a></p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Self Track 26 App.</p>
    </div>
</body>
</html>
